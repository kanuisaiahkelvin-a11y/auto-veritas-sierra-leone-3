<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto-Veritas SLRSA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./index.css">
  <style>
    @keyframes moveVehicle {
      0% { transform: translateX(-50px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(50px); opacity: 0; }
    }
    .moving-vehicle {
      animation: moveVehicle 4s linear infinite;
    }
    
    /* Apply Franklin Gothic Medium globally */
    body {
      font-family: "Franklin Gothic Medium", "ITC Franklin Gothic", "Arial Narrow", Arial, sans-serif;
    }
    
    /* Override Tailwind's default sans stack to ensure the whole app reflects the change */
    .font-sans {
      font-family: "Franklin Gothic Medium", "ITC Franklin Gothic", "Arial Narrow", Arial, sans-serif !important;
    }
  </style>
</head>
<body class="bg-[#fcf8f3] text-slate-900 overflow-x-hidden font-sans">
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
